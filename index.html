<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>江牧 · 摄影作品集</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Noto+Sans+SC:wght@300;400;500;600&family=Noto+Serif+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #050505;
      --bg: #0a0a0a;
      --bg-elevated: #111111;
      --gold: #C8A464;
      --gold-hover: #E0C080;
      --gold-dim: rgba(200, 164, 100, 0.15);
      --gold-mid: rgba(200, 164, 100, 0.4);
      --text: #E8E8E8;
      --text-muted: #999999;
      --text-dim: #555555;
      --border: rgba(200, 164, 100, 0.15);
      --font-sans: 'Inter', 'Noto Sans SC', -apple-system, sans-serif;
      --font-serif: 'Noto Serif SC', 'Georgia', serif;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
      background: var(--bg-deep);
      color: var(--text);
      font-family: var(--font-sans);
      font-weight: 300;
      line-height: 1.7;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    ::selection {
      background: rgba(200, 164, 100, 0.25);
      color: var(--text);
    }

    /* Custom cursor — desktop only */
    @media (hover: hover) and (pointer: fine) {
      body, a, button, [data-clickable] { cursor: none; }
      .cursor-dot {
        width: 5px; height: 5px;
        background: var(--gold);
        border-radius: 50%;
        position: fixed;
        pointer-events: none;
        z-index: 99999;
        transform: translate(-50%, -50%);
        transition: transform 0.06s ease-out, opacity 0.2s, width 0.2s, height 0.2s;
      }
      .cursor-ring {
        width: 28px; height: 28px;
        border: 1px solid rgba(200, 164, 100, 0.45);
        border-radius: 50%;
        position: fixed;
        pointer-events: none;
        z-index: 99998;
        transform: translate(-50%, -50%);
        transition: transform 0.12s ease-out, width 0.25s, height 0.25s, border-color 0.25s, background 0.25s;
      }
      .cursor-hover .cursor-ring {
        width: 44px; height: 44px;
        border-color: rgba(200, 164, 100, 0.7);
        background: rgba(200, 164, 100, 0.06);
      }
      .cursor-hover .cursor-dot {
        width: 7px; height: 7px;
      }
    }

    /* Image loading */
    img {
      opacity: 0;
      transition: opacity 0.6s ease;
    }
    img.loaded { opacity: 1; }
    .img-fallback {
      background-image: linear-gradient(135deg, #0d0d0d 0%, #1a1a1a 50%, #0d0d0d 100%) !important;
      background-color: #0d0d0d !important;
      position: relative;
      overflow: hidden;
    }
    .img-fallback::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(45deg, transparent 40%, rgba(200, 164, 100, 0.03) 50%, transparent 60%);
      animation: shimmer 2.5s infinite;
    }
    @keyframes shimmer {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }

    /* Navigation */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 24px 5vw;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: linear-gradient(to bottom, rgba(5,5,5,0.92) 0%, rgba(5,5,5,0) 100%);
      -webkit-backdrop-filter: blur(10px);
      backdrop-filter: blur(10px);
      transition: background 0.4s, padding 0.3s;
    }
    .nav.scrolled {
      background: rgba(5,5,5,0.96);
      -webkit-backdrop-filter: blur(14px);
      backdrop-filter: blur(14px);
      padding: 16px 5vw;
      border-bottom: 1px solid rgba(200, 164, 100, 0.06);
    }
    .nav-brand {
      font-family: var(--font-serif);
      font-size: 1.2rem;
      color: var(--gold);
      letter-spacing: 0.15em;
      text-decoration: none;
      font-weight: 500;
    }
    .nav-links {
      display: flex;
      gap: 36px;
      list-style: none;
      align-items: center;
    }
    .nav-links a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      transition: color 0.3s;
      position: relative;
      font-weight: 400;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--gold); }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -5px; left: 0;
      width: 0; height: 1px;
      background: var(--gold);
      transition: width 0.3s ease;
    }
    .nav-links a:hover::after, .nav-links a.active::after { width: 100%; }
    .nav-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--gold);
      font-size: 1.4rem;
      padding: 4px;
    }

    /* Mobile menu */
    .mobile-menu {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(5,5,5,0.98);
      z-index: 99;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .mobile-menu.open {
      display: flex;
      opacity: 1;
    }
    .mobile-menu a {
      color: var(--text);
      font-family: var(--font-serif);
      font-size: 1.6rem;
      text-decoration: none;
      letter-spacing: 0.12em;
      transition: color 0.3s;
    }
    .mobile-menu a:hover { color: var(--gold); }
    .mobile-close {
      position: absolute;
      top: 20px; right: 5vw;
      background: none;
      border: none;
      color: var(--gold);
      font-size: 2rem;
    }

    /* Page transitions */
    .page {
      opacity: 0;
      transform: translateY(16px);
      animation: fadeInUp 0.55s ease forwards;
    }
    @keyframes fadeInUp {
      to { opacity: 1; transform: translateY(0); }
    }
    .stagger-1 { animation-delay: 0.06s; }
    .stagger-2 { animation-delay: 0.12s; }
    .stagger-3 { animation-delay: 0.18s; }
    .stagger-4 { animation-delay: 0.24s; }

    /* Reveal on scroll */
    .reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.8s ease, transform 0.8s ease;
    }
    .reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* Home Hero */
    .hero {
      height: 100vh;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }
    .hero-bg {
      position: absolute;
      inset: -20px;
      background-size: cover;
      background-position: center;
      filter: brightness(0.55);
      transition: transform 0.1s ease-out;
      will-change: transform;
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, rgba(5,5,5,0.5) 0%, rgba(5,5,5,0.1) 35%, rgba(5,5,5,0.85) 100%);
    }
    .hero-content {
      position: relative;
      z-index: 2;
      text-align: center;
      padding: 0 5vw;
    }
    .hero-title {
      font-family: var(--font-serif);
      font-size: clamp(2.8rem, 7vw, 5.5rem);
      color: var(--gold);
      font-weight: 600;
      letter-spacing: 0.2em;
      margin-bottom: 18px;
      line-height: 1.1;
    }
    .hero-subtitle {
      font-size: clamp(0.85rem, 1.8vw, 1.1rem);
      color: var(--text-muted);
      font-weight: 300;
      letter-spacing: 0.12em;
      line-height: 1.6;
    }
    .hero-scroll {
      position: absolute;
      bottom: 36px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 2;
      animation: bounce 2.2s infinite;
      cursor: pointer;
    }
    .hero-scroll svg {
      width: 26px; height: 26px;
      stroke: var(--gold);
      stroke-width: 1.2;
      fill: none;
      opacity: 0.7;
    }
    @keyframes bounce {
      0%, 20%, 50%, 80%, 100% { transform: translateX(-50%) translateY(0); }
      40% { transform: translateX(-50%) translateY(-12px); }
      60% { transform: translateX(-50%) translateY(-6px); }
    }

    /* Section base */
    .section {
      padding: 110px 5vw;
    }
    .section-title-row {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      max-width: 1300px;
      margin: 0 auto 56px;
      flex-wrap: wrap;
      gap: 16px;
    }
    .section-title {
      font-family: var(--font-serif);
      font-size: clamp(1.4rem, 3vw, 2rem);
      color: var(--gold);
      letter-spacing: 0.1em;
      font-weight: 500;
    }
    .section-link {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      transition: color 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 400;
    }
    .section-link:hover { color: var(--gold-hover); }
    .section-link svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2; fill: none; }

    /* Featured works */
    .featured-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      max-width: 1300px;
      margin: 0 auto;
    }
    .work-card {
      position: relative;
      overflow: hidden;
      background: var(--bg-elevated);
      border-radius: 3px;
      aspect-ratio: 3/4;
      display: block;
      text-decoration: none;
      border: 1px solid transparent;
      transition: border-color 0.3s, transform 0.4s ease;
    }
    .work-card:hover { border-color: var(--border); transform: translateY(-3px); }
    .work-card img {
      width: 100%; height: 100%;
      object-fit: cover;
      transition: transform 0.7s ease, opacity 0.3s;
      display: block;
    }
    .work-card:hover img { transform: scale(1.06); }
    .work-card .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(5,5,5,0.85) 0%, rgba(5,5,5,0.3) 45%, transparent 70%);
      opacity: 0;
      transition: opacity 0.45s ease;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 24px 20px;
    }
    .work-card:hover .overlay { opacity: 1; }
    .overlay-title {
      font-family: var(--font-serif);
      font-size: 1.05rem;
      color: var(--text);
      margin-bottom: 6px;
      font-weight: 500;
      letter-spacing: 0.04em;
    }
    .overlay-cat {
      font-size: 0.72rem;
      color: var(--gold);
      letter-spacing: 0.06em;
      font-weight: 400;
    }

    /* Category entry cards */
    .cat-entry-section {
      padding: 0 5vw 100px;
    }
    .cat-entry-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 16px;
      max-width: 1300px;
      margin: 0 auto;
    }
    .cat-entry-card {
      position: relative;
      overflow: hidden;
      border-radius: 4px;
      padding: 40px 24px;
      text-align: center;
      text-decoration: none;
      border: 1px solid var(--border);
      transition: transform 0.4s ease, border-color 0.3s, box-shadow 0.4s;
      background: var(--bg-elevated);
    }
    .cat-entry-card:hover {
      transform: translateY(-4px);
      border-color: rgba(200, 164, 100, 0.3);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }
    .cat-entry-card .cat-title {
      font-family: var(--font-serif);
      font-size: 1.3rem;
      color: var(--gold);
      margin-bottom: 10px;
      letter-spacing: 0.08em;
      font-weight: 500;
    }
    .cat-entry-card .cat-count {
      font-size: 0.75rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
    }
    .cat-entry-card .cat-bg {
      position: absolute;
      inset: 0;
      opacity: 0.15;
      transition: opacity 0.4s;
      z-index: 0;
    }
    .cat-entry-card:hover .cat-bg { opacity: 0.25; }
    .cat-entry-card > *:not(.cat-bg) { position: relative; z-index: 1; }

    /* Quote section */
    .quote-section {
      padding: 120px 5vw;
      text-align: center;
      max-width: 850px;
      margin: 0 auto;
    }
    .quote-mark {
      font-family: var(--font-serif);
      font-size: 4rem;
      color: var(--gold);
      opacity: 0.25;
      line-height: 1;
      margin-bottom: 8px;
    }
    .quote-text {
      font-family: var(--font-serif);
      font-size: clamp(1.15rem, 2.2vw, 1.55rem);
      color: var(--text);
      line-height: 2;
      font-weight: 400;
      letter-spacing: 0.06em;
    }
    .quote-author {
      margin-top: 28px;
      font-size: 0.8rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
    }
    .quote-divider {
      width: 32px;
      height: 1px;
      background: var(--gold);
      margin: 28px auto 0;
      opacity: 0.4;
    }

    /* Intro section */
    .intro-section {
      padding: 0 5vw 110px;
      max-width: 1000px;
      margin: 0 auto;
      display: flex;
      gap: 56px;
      align-items: center;
    }
    .intro-avatar-wrap {
      flex-shrink: 0;
      position: relative;
    }
    .intro-avatar {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 1px solid var(--gold-dim);
      display: block;
      position: relative;
      z-index: 1;
    }
    .intro-avatar-wrap::before {
      content: '';
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      border: 1px solid rgba(200, 164, 100, 0.08);
      z-index: 0;
    }
    .intro-text { flex: 1; }
    .intro-text h3 {
      font-family: var(--font-serif);
      font-size: 1.25rem;
      color: var(--gold);
      margin-bottom: 14px;
      font-weight: 500;
      letter-spacing: 0.06em;
    }
    .intro-text p {
      color: var(--text-muted);
      font-size: 0.92rem;
      line-height: 1.9;
      margin-bottom: 20px;
    }
    .intro-link {
      color: var(--gold);
      text-decoration: none;
      font-size: 0.82rem;
      letter-spacing: 0.06em;
      transition: color 0.3s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-weight: 400;
    }
    .intro-link:hover { color: var(--gold-hover); }
    .intro-link svg { width: 14px; height: 14px; stroke: currentColor; stroke-width: 2; fill: none; }

    /* Stats section */
    .stats-section {
      padding: 0 5vw 110px;
    }
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 20px;
      max-width: 1100px;
      margin: 0 auto;
    }
    .stat-card {
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 36px 20px;
      text-align: center;
      transition: border-color 0.3s, transform 0.3s;
    }
    .stat-card:hover {
      border-color: rgba(200, 164, 100, 0.3);
      transform: translateY(-3px);
    }
    .stat-number {
      font-family: var(--font-serif);
      font-size: clamp(2rem, 4vw, 2.8rem);
      color: var(--gold);
      font-weight: 600;
      letter-spacing: 0.04em;
      line-height: 1;
      margin-bottom: 10px;
    }
    .stat-label {
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.08em;
      font-weight: 400;
    }

    /* Contact CTA */
    .cta-section {
      padding: 100px 5vw;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .cta-section::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, var(--bg) 0%, rgba(200,164,100,0.02) 50%, var(--bg) 100%);
      pointer-events: none;
    }
    .cta-inner {
      position: relative;
      z-index: 1;
      max-width: 700px;
      margin: 0 auto;
    }
    .cta-title {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 3.5vw, 2.2rem);
      color: var(--text);
      margin-bottom: 14px;
      letter-spacing: 0.08em;
      font-weight: 500;
    }
    .cta-subtitle {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-bottom: 36px;
      letter-spacing: 0.04em;
    }
    .cta-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--gold);
      text-decoration: none;
      font-size: 0.88rem;
      letter-spacing: 0.08em;
      padding: 14px 36px;
      border: 1px solid var(--gold-dim);
      border-radius: 2px;
      transition: all 0.4s ease;
      font-weight: 400;
    }
    .cta-btn:hover {
      background: var(--gold);
      color: var(--bg-deep);
      border-color: var(--gold);
    }
    .cta-btn svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 1.5; fill: none; }

    /* Portfolio page */
    .portfolio-header {
      padding: 140px 5vw 40px;
      text-align: center;
      max-width: 900px;
      margin: 0 auto;
    }
    .portfolio-header h1 {
      font-family: var(--font-serif);
      font-size: clamp(2rem, 4vw, 2.8rem);
      color: var(--gold);
      margin-bottom: 12px;
      letter-spacing: 0.1em;
      font-weight: 500;
    }
    .portfolio-header p {
      font-size: 0.95rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
    }
    .back-home-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.82rem;
      margin-bottom: 28px;
      transition: color 0.3s;
      letter-spacing: 0.04em;
    }
    .back-home-btn:hover { color: var(--gold); }
    .back-home-btn svg { width: 16px; height: 16px; stroke: currentColor; stroke-width: 2; fill: none; }

    .filter-bar {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 48px;
      flex-wrap: wrap;
      padding: 0 5vw;
      position: sticky;
      top: 72px;
      z-index: 50;
      padding-top: 16px;
      padding-bottom: 16px;
      background: linear-gradient(to bottom, var(--bg-deep) 80%, rgba(5,5,5,0.9) 100%);
      -webkit-backdrop-filter: blur(8px);
      backdrop-filter: blur(8px);
    }
    .filter-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-family: var(--font-sans);
      font-size: 0.82rem;
      letter-spacing: 0.05em;
      padding: 8px 16px;
      position: relative;
      transition: color 0.3s;
      font-weight: 400;
      border-radius: 2px;
    }
    .filter-btn.active {
      color: var(--gold);
      background: rgba(200, 164, 100, 0.08);
    }
    .filter-btn:hover { color: var(--gold-hover); }
    .filter-btn.active::after {
      content: '';
      position: absolute;
      bottom: 0; left: 12px; right: 12px;
      height: 1px;
      background: var(--gold);
    }
    .filter-count {
      color: var(--text-dim);
      font-size: 0.72rem;
      margin-left: 3px;
    }

    .portfolio-grid {
      column-count: 3;
      column-gap: 20px;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 5vw 100px;
    }
    .portfolio-item {
      break-inside: avoid;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
      border-radius: 3px;
      background: var(--bg-elevated);
      display: block;
      text-decoration: none;
      border: 1px solid transparent;
      transition: border-color 0.3s;
    }
    .portfolio-item:hover { border-color: var(--border); }
    .portfolio-item img {
      width: 100%;
      display: block;
      transition: transform 0.7s ease, opacity 0.3s;
    }
    .portfolio-item:hover img { transform: scale(1.04); }
    .portfolio-item .item-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(5,5,5,0.88) 0%, rgba(5,5,5,0.3) 50%, transparent 100%);
      opacity: 0;
      transition: opacity 0.45s ease;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 20px 18px;
    }
    .portfolio-item:hover .item-overlay { opacity: 1; }
    .item-title { font-family: var(--font-serif); font-size: 0.95rem; color: var(--text); margin-bottom: 4px; font-weight: 500; }
    .item-cat { font-size: 0.72rem; color: var(--gold); letter-spacing: 0.06em; margin-bottom: 2px; }
    .item-date { font-size: 0.7rem; color: var(--text-dim); letter-spacing: 0.04em; }
    .empty-state {
      text-align: center;
      color: var(--text-muted);
      padding: 100px 0;
      font-size: 0.95rem;
      column-span: all;
    }

    /* Work detail */
    .detail-hero {
      padding: 120px 5vw 40px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .detail-img-wrap {
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
      position: relative;
    }
    .detail-img-wrap::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 5%; right: 5%;
      height: 40px;
      background: radial-gradient(ellipse at center, rgba(0,0,0,0.4) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
    }
    .detail-img-wrap img {
      width: 100%;
      max-height: 82vh;
      object-fit: contain;
      display: block;
      position: relative;
      z-index: 1;
    }

      name: "江牧",

      email: "hello@jiangmu.photo",
      location: "中国 · 上海",
      avatar: "./author-avatar.jpg",

      heroSubtitle: "独立摄影师 / 用镜头叙述光影",
      philosophy: `摄影于我，不是记录现实的工具，而是理解世界的方式。每一张照片都是一次选择——选择看见什么，选择忽略什么，选择在哪个瞬间按下快门。我相信最动人的影像往往诞生于等待与偶然之间，在光线、情绪与时空的交汇点上。我的镜头追求的不是完美，而是真实；不是炫技，而是共情。`,
      social: [
        { name: "微博", url: "https://weibo.com" },
        { name: "Instagram", url: "https://instagram.com" },
        { name: "小红书", url: "https://xiaohongshu.com" },
        { name: "Behance", url: "https://behance.net" }
      ],
      phone: "",
      wechat: "",
      instagram: "",
      website: "",
      weibo: "",
      xiaohongshu: "",
      behance: "",
      experience: "10",
      awards: ""
    };

    const defaultCategories = {
      all: { label: "全部", color: "#999", key: "all" },
      portrait: { label: "人像", color: "#D4A853", key: "portrait" },
      landscape: { label: "风光", color: "#53A0D4", key: "landscape" },

      commercial: { label: "商业", color: "#D453B8", key: "commercial" }
    };

    const defaultWorks = workData.map((w, i) => {
      const idx = String(i + 1).padStart(2, '0');
      return {
        id: "w" + idx,
        title: w.t,
        category: w.c,
        image: "./work-" + idx + ".jpg",
        thumb: "./work-" + idx + ".jpg",
        description: w.d,
        date: "2023-" + String((i % 12) + 1).padStart(2, '0') + "-15",
        location: w.loc,
        camera: w.cam,
        lens: w.lens
      };
    });

    function getDefaultData() {
      return { profile: JSON.parse(JSON.stringify(defaultProfile)), works: JSON.parse(JSON.stringify(defaultWorks)), categories: JSON.parse(JSON.stringify(defaultCategories)) };
    }

    /* ==================== Data Layer ==================== */
    let appData = null;
    let currentFilter = 'all';

    function loadData() {
      const raw = localStorage.getItem('siteData');
      if (raw) {
        try { appData = JSON.parse(raw); }
        catch (e) { appData = getDefaultData(); }
      } else {
        appData = getDefaultData();
      }
      // 缺失字段的简单补全
      if (!appData.profile) appData.profile = JSON.parse(JSON.stringify(defaultProfile));
      if (!appData.works) appData.works = JSON.parse(JSON.stringify(defaultWorks));
      if (!appData.categories) appData.categories = JSON.parse(JSON.stringify(defaultCategories));
    }

    function saveData() {
      localStorage.setItem('siteData', JSON.stringify(appData));
    }

    function getPhotographer() { return appData.profile; }
    function getWorks() { return appData.works || []; }
    function getCategories() { return appData.categories || defaultCategories; }
    function getWorkById(id) { return getWorks().find(w => w.id === id); }
    function getCategoryCount(cat) {
      if (cat === 'all') return getWorks().length;
      return getWorks().filter(w => w.category === cat).length;
    }

    /* ==================== Router ==================== */
    function init() {
      loadData();
      setupRouter();
      setupCursor();
      setupNav();
      setupMobileMenu();
      setupScrollReveal();
      setupStorageListener();
      render();
      updateYear();
    }

    function setupRouter() {
      window.addEventListener('hashchange', render);
    }

    function setupStorageListener() {
      window.addEventListener('storage', (e) => {
        if (e.key === 'siteData') {
          loadData();
          render();
        }
      });
    }

    function updateYear() {
      const el = document.getElementById('footerCopy');
      if (el) el.textContent = '© ' + new Date().getFullYear() + ' 江牧 · 保留所有权利';
    }

    function render() {
      const hash = window.location.hash.replace('#', '').split('?')[0] || '/';
      const parts = hash.split('/').filter(Boolean);
      const page = parts[0] || 'home';
      const app = document.getElementById('app');
      app.innerHTML = '';

      if (page === 'home') renderHome(app);
      else if (page === 'portfolio') renderPortfolio(app);
      else if (page === 'work' && parts[1]) renderWorkDetail(app, parts[1]);
      else if (page === 'about') renderAbout(app);
      else renderHome(app);

      updateNavActive();
      window.scrollTo(0, 0);
      setupImages();
      setupHeroBg();
      setupCursorHover();
      setupScrollReveal();
    }

    function updateNavActive() {
      const hash = window.location.hash.replace('#', '').split('?')[0] || '/';
      const parts = hash.split('/').filter(Boolean);
      const page = parts[0] || 'home';
      document.querySelectorAll('.nav-links a, .mobile-menu a').forEach(a => {
        let href = a.getAttribute('href') || '';
        href = href.replace('#/', '').split('/')[0] || 'home';
        a.classList.toggle('active', href === page);
      });
    }

    /* ==================== Renderers ==================== */
    function renderHome(container) {
      container.innerHTML = '';
      const p = getPhotographer();
      const works = getWorks().slice(0, 12);
      const cats = getCategories();
      const allWorks = getWorks();

      const catGradients = {};
      Object.entries(cats).forEach(([key, cat]) => {
        catGradients[key] = `linear-gradient(135deg, ${cat.color}, ${cat.color})`;
      });

      const page = document.createElement('div');
      page.className = 'page';
      page.innerHTML = `
        <section class="hero">
          <div class="hero-bg" id="heroBg" style="background-image:url('${p.heroImage || p.avatar}')"></div>
          <div class="hero-overlay"></div>
          <div class="hero-content">
            <h1 class="hero-title">${p.heroTitle || p.name}</h1>
            <p class="hero-subtitle">${p.heroSubtitle || p.role}</p>
          </div>
          <div class="hero-scroll" id="heroScroll" data-clickable>
            <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
          </div>
        </section>

        <section class="section">
          <div class="section-title-row">
            <h2 class="section-title">精选作品</h2>
            <a href="#/portfolio" class="section-link" data-clickable>查看全部 <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></a>
          </div>
          <div class="featured-grid">
            ${works.map((w, i) => `
              <a href="#/work/${w.id}" class="work-card reveal" data-clickable style="animation-delay:${i * 0.04}s">
                <img src="${w.thumb || w.image}" alt="${w.title}" onload="this.classList.add('loaded')" onerror="this.classList.add('loaded'); this.classList.add('img-fallback')">
                <div class="overlay">
                  <div class="overlay-title">${w.title}</div>
                  <div class="overlay-cat">${cats[w.category]?.label || w.category}</div>
                </div>
              </a>
            `).join('')}
          </div>
        </section>

        <section class="cat-entry-section">
          <div class="cat-entry-grid">
            ${Object.entries(cats).map(([key, cat]) => `
              <a href="#/portfolio" class="cat-entry-card" data-cat="${key}" data-clickable>
                <div class="cat-bg" style="background:${catGradients[key] || catGradients.all}"></div>
                <div class="cat-title">${cat.label}</div>
                <div class="cat-count">${getCategoryCount(key)} 件作品</div>
              </a>
            `).join('')}
          </div>
        </section>

        <section class="quote-section">
          <div class="quote-mark">"</div>
          <p class="quote-text">摄影是光与影的诗歌，是时间的切片，也是灵魂与世界的对话。</p>
          <div class="quote-divider"></div>
          <div class="quote-author">—— 江牧</div>
        </section>

        <section class="intro-section">
          <div class="intro-avatar-wrap">
            <img src="${p.avatar}" alt="${p.name}" class="intro-avatar" onload="this.classList.add('loaded')" onerror="this.classList.add('loaded'); this.classList.add('img-fallback')">
          </div>
          <div class="intro-text">
            <h3>${p.name} · ${p.role}</h3>
            <p>${p.bio.split('\n').slice(0, 2).join(' ').substring(0, 140)}…</p>
            <a href="#/about" class="intro-link" data-clickable>了解更多 <svg viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg></a>
          </div>
        </section>

        <section class="stats-section">
          <div class="stats-grid">
            <div class="stat-card reveal">
              <div class="stat-number">${allWorks.length}</div>
              <div class="stat-label">摄影作品</div>
            </div>
            <div class="stat-card reveal">
              <div class="stat-number">${new Date().getFullYear() - 2015}</div>
              <div class="stat-label">拍摄年数</div>
            </div>
            <div class="stat-card reveal">
              <div class="stat-number">12</div>
              <div class="stat-label">覆盖城市</div>
            </div>
            <div class="stat-card reveal">
              <div class="stat-number">30+</div>
              <div class="stat-label">合作品牌</div>
            </div>
          </div>
        </section>

        <section class="cta-section">
          <div class="cta-inner">
            <h2 class="cta-title">开启你的视觉之旅</h2>
            <p class="cta-subtitle">每一个瞬间都值得被记录</p>
            <a href="mailto:${p.email}" class="cta-btn" data-clickable>
              <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 4l10 8 10-8"/></svg>
              ${p.email}
            </a>
          </div>
        </section>
      `;
      container.appendChild(page);

      // Hero parallax
      const heroBg = document.getElementById('heroBg');
      if (heroBg) {
        document.querySelector('.hero').addEventListener('mousemove', (e) => {
          const x = (e.clientX / window.innerWidth - 0.5) * 12;
          const y = (e.clientY / window.innerHeight - 0.5) * 12;
          heroBg.style.transform = `translate(${x}px, ${y}px) scale(1.05)`;
        });
      }

      // Scroll down arrow
      const heroScroll = document.getElementById('heroScroll');
      if (heroScroll) {
        heroScroll.addEventListener('click', () => {
          document.querySelector('.section').scrollIntoView({ behavior: 'smooth' });
        });
      }

      // Category entry clicks set filter
      page.querySelectorAll('.cat-entry-card').forEach(card => {
        card.addEventListener('click', (e) => {
          const cat = card.dataset.cat;
          if (cat && cat !== 'all') {
            currentFilter = cat;
          } else {
            currentFilter = 'all';
          }
        });
      });
    }

    function renderPortfolio(container) {
      container.innerHTML = '';
      const cats = getCategories();
      const allWorks = getWorks();
      const filtered = allWorks.filter(w => currentFilter === 'all' || w.category === currentFilter);

      const page = document.createElement('div');
      page.className = 'page';
      page.innerHTML = `
        <section class="portfolio-header">
          <a href="#" class="back-home-btn" data-clickable>
            <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            返回首页
          </a>
          <h1>作品集</h1>
          <p>每一帧都是时间的切片</p>
        </section>
        <div class="filter-bar" id="filterBar">
          ${Object.entries(cats).map(([key, cat]) => `
            <button class="filter-btn ${currentFilter === key ? 'active' : ''}" data-cat="${key}" data-clickable>
              ${cat.label}<span class="filter-count"> · ${getCategoryCount(key)}</span>
            </button>
          `).join('')}
        </div>
        <div class="portfolio-grid" id="portfolioGrid">
          ${filtered.length ? filtered.map((w, i) => `
            <a href="#/work/${w.id}" class="portfolio-item" data-clickable style="animation-delay:${(i % 6) * 0.05}s">
              <img src="${w.thumb || w.image}" alt="${w.title}" onload="this.classList.add('loaded')" onerror="this.classList.add('loaded'); this.classList.add('img-fallback')">
              <div class="item-overlay">
                <div class="item-title">${w.title}</div>
                <div class="item-cat">${cats[w.category]?.label || w.category}</div>
                <div class="item-date">${w.date || ''}</div>
              </div>
            </a>
          `).join('') : '<div class="empty-state">该分类暂无作品</div>'}
        </div>
      `;
      container.appendChild(page);

      page.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          currentFilter = btn.dataset.cat;
          renderPortfolio(container);
          setupImages();
          setupScrollReveal();
          window.scrollTo({ top: 0, behavior: 'smooth' });
        });
      });
    }

    function renderWorkDetail(container, id) {
      container.innerHTML = '';
      const work = getWorkById(id);
      if (!work) {
        window.location.hash = '#/portfolio';
        return;
      }
      const cats = getCategories();
      const related = getWorks().filter(w => w.id !== work.id && w.category === work.category).slice(0, 4);

      const page = document.createElement('div');
      page.className = 'page';
      page.innerHTML = `
        <section class="detail-hero">
          <div class="detail-img-wrap">
            <img src="${work.image}" alt="${work.title}">
          </div>
        </section>
        <div class="detail-meta">
          <a href="#/portfolio" class="back-btn" data-clickable>
            <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            返回作品集
          </a>
          <h1>${work.title}</h1>
          <span class="detail-cat">${cats[work.category]?.label || work.category}</span>
          <p class="detail-desc">${work.description}</p>
          <div class="detail-info">
            <div class="info-item">
              <svg width="20" height="20" viewBox="0 0 24 24" stroke="var(--gold)" stroke-width="1.5" fill="none" style="margin:0 auto 6px;display:block"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
              <label>拍摄日期</label>
              <span>${work.date || '-'}</span>
            </div>
            <div class="info-item">
              <svg width="20" height="20" viewBox="0 0 24 24" stroke="var(--gold)" stroke-width="1.5" fill="none" style="margin:0 auto 6px;display:block"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              <label>地点</label>
              <span>${work.location || '-'}</span>
            </div>
            <div class="info-item">
              <svg width="20" height="20" viewBox="0 0 24 24" stroke="var(--gold)" stroke-width="1.5" fill="none" style="margin:0 auto 6px;display:block"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
              <label>相机</label>
              <span>${work.camera || '-'}</span>
            </div>
            <div class="info-item">
              <svg width="20" height="20" viewBox="0 0 24 24" stroke="var(--gold)" stroke-width="1.5" fill="none" style="margin:0 auto 6px;display:block"><circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="4"/><path d="M4.93 4.93l4.24 4.24M14.83 14.83l4.24 4.24M14.83 9.17l4.24-4.24M4.93 19.07l4.24-4.24"/></svg>
              <label>镜头</label>
              <span>${work.lens || '-'}</span>
            </div>
          </div>
        </div>
        ${related.length ? `
          <div class="related-section">
            <h3 class="related-title">同系列作品</h3>
            <div class="related-grid">
              ${related.map(w => `
                <a href="#/work/${w.id}" class="work-card" data-clickable>
                  <img src="${w.thumb || w.image}" alt="${w.title}" onload="this.classList.add('loaded')" onerror="this.classList.add('loaded'); this.classList.add('img-fallback')">
                  <div class="overlay">
                    <div class="overlay-title">${w.title}</div>
                    <div class="overlay-cat">${cats[w.category]?.label || w.category}</div>
                  </div>
                </a>
              `).join('')}
            </div>
          </div>
        ` : ''}
      `;
      container.appendChild(page);
    }

    function renderAbout(container) {
      container.innerHTML = '';
      const p = getPhotographer();
      const bioParagraphs = p.bio.split('\n').filter(s => s.trim());
      const philosophy = p.philosophy || defaultProfile.philosophy;

      const page = document.createElement('div');
      page.className = 'page';
      page.innerHTML = `
        <section class="about-hero">
          <img src="${p.avatar}" alt="${p.name}" class="about-avatar" onload="this.classList.add('loaded')" onerror="this.classList.add('loaded'); this.classList.add('img-fallback')">
          <h1 class="about-name">${p.name}</h1>
          <p class="about-role">${p.role}</p>
          <p class="about-location">${p.location}</p>
          <div class="about-divider"></div>
        </section>
        <div class="about-content">
          ${bioParagraphs.map(par => `<p>${par.trim()}</p>`).join('')}
        </div>
        <div class="philosophy-section">
          <h3 class="philosophy-title">摄影理念</h3>
          <p class="philosophy-text">${philosophy}</p>
        </div>
        <div class="about-contact">
          <h3 class="contact-title">联系方式</h3>
          <div class="contact-grid">
            <a href="mailto:${p.email}" class="contact-item" data-clickable>
              <svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M2 4l10 8 10-8"/></svg>
              <span>${p.email}</span>
            </a>
            <div class="contact-item">
              <svg viewBox="0 0 24 24"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
              <span>${p.location}</span>
            </div>
            <div class="contact-item">
              <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg>
              <span>2015 年至今</span>
            </div>
          </div>
        </div>
        <div class="about-social">
          ${(p.social || []).map(s => `<a href="${s.url}" target="_blank" rel="noopener" data-clickable>${s.name}</a>`).join('')}
        </div>
      `;
      container.appendChild(page);
    }

    /* ==================== Utilities ==================== */
    function setupImages() {
      document.querySelectorAll('img').forEach(img => {
        if (img.complete && img.naturalWidth) {
          img.classList.add('loaded');
        } else {
          img.addEventListener('load', () => img.classList.add('loaded'));
          img.addEventListener('error', () => {
            img.classList.add('img-fallback');
            img.classList.add('loaded');
          });
        }
      });
    }

    function setupHeroBg() {
      const heroBg = document.getElementById('heroBg');
      if (!heroBg) return;
      const img = new Image();
      img.onload = () => { heroBg.classList.remove('img-fallback'); };
      img.onerror = () => { heroBg.classList.add('img-fallback'); };
      const style = heroBg.style.backgroundImage;
      const url = style.replace(/^url\(["']?/, '').replace(/["']?\)$/, '');
      if (url && url !== 'none') img.src = url;
    }

    function setupCursor() {
      const dot = document.getElementById('cursorDot');
      const ring = document.getElementById('cursorRing');
      if (!dot || !ring) return;
      if (window.matchMedia('(hover: none)').matches) {
        dot.style.display = 'none';
        ring.style.display = 'none';
        return;
      }
      let mx = 0, my = 0, rx = 0, ry = 0;
      document.addEventListener('mousemove', (e) => { mx = e.clientX; my = e.clientY; });
      function animate() {
        rx += (mx - rx) * 0.15;
        ry += (my - ry) * 0.15;
        dot.style.left = mx + 'px'; dot.style.top = my + 'px';
        ring.style.left = rx + 'px'; ring.style.top = ry + 'px';
        requestAnimationFrame(animate);
      }
      animate();
    }

    function setupCursorHover() {
      const body = document.body;
      document.querySelectorAll('a, button, [data-clickable]').forEach(el => {
        el.addEventListener('mouseenter', () => body.classList.add('cursor-hover'));
        el.addEventListener('mouseleave', () => body.classList.remove('cursor-hover'));
      });
    }

    function setupNav() {
      const nav = document.getElementById('nav');
      if (!nav) return;
      window.addEventListener('scroll', () => {
        nav.classList.toggle('scrolled', window.scrollY > 60);
      });
    }

    function setupMobileMenu() {
      const toggle = document.getElementById('navToggle');
      const close = document.getElementById('mobileClose');
      const menu = document.getElementById('mobileMenu');
      if (!toggle || !menu) return;
      toggle.addEventListener('click', () => menu.classList.add('open'));
      close.addEventListener('click', () => menu.classList.remove('open'));
      menu.querySelectorAll('a').forEach(a => a.addEventListener('click', () => menu.classList.remove('open')));
    }

    function setupScrollReveal() {
      const observer = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            entry.target.classList.add('visible');
          }
        });
      }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });
      document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
    }

    /* ==================== Init ==================== */
    document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
</html>
